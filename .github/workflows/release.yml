name: release

on:
  push:
    branches: [master]
    # Skip release builds for doc-only / CI-only / .gitignore changes —
    # those don't ship a new APK and re-tagging an existing release is
    # surprising. Match watchnext + trail conventions.
    paths-ignore:
      - '**/*.md'
      - '.github/**'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Write google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Write keystore and key.properties
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/groceries-release.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../groceries-release.jks
          EOF

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "name=v$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build APK
        run: flutter build apk --release

      # Flutter always copies the signed APK to flutter-apk/app-release.apk
      # regardless of Gradle's applicationVariants output name. Rename it to
      # the versioned user-facing filename before attaching to the release.
      - name: Stage release artifact
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/Groceries-v${{ steps.version.outputs.version }}.apk

      - name: Generate human-readable release notes
        id: notes
        # Replaces softprops's `generate_release_notes: true` (which produces
        # a "Full Changelog: compare/v...v" link). The python script reads
        # `git log` between the previous tag and HEAD, drops internal
        # commit types (docs/chore/test/ci/build/refactor/style), and emits
        # plain English bullets. Per-commit `Release-note:` and
        # `Release-skip:` overrides in the body are honoured. See watchnext
        # for the reference implementation.
        run: |
          git fetch --tags --depth=50 origin
          NOTES=$(python3 .github/scripts/release_notes.py)
          {
            echo "body<<__RELEASE_NOTES_EOF__"
            echo "$NOTES"
            echo "__RELEASE_NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"
          echo "--- Release notes preview ---"
          echo "$NOTES"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: build/app/outputs/flutter-apk/Groceries-v${{ steps.version.outputs.version }}.apk
          fail_on_unmatched_files: true
          body: |
            ## Install

            Download **Groceries-v${{ steps.version.outputs.version }}.apk** from the Assets below and open it on your Android device. First-time install? You may need to allow your browser to install apps from unknown sources.

            > Already have Groceries? Install the new APK straight over the top — your sign-in, household, and lists are preserved.

            ---

            ### What's new

            ${{ steps.notes.outputs.body }}
