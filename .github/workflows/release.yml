name: release

on:
  push:
    branches: [master]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Write google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Write keystore and key.properties
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/groceries-release.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../groceries-release.jks
          EOF

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "name=v$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build APK
        run: flutter build apk --release

      # Gradle already renames the APK to groceries-v<version>-release.apk via
      # the applicationVariants block in android/app/build.gradle.kts.
      # Flatten that to the user-facing name (no build-type suffix) before
      # attaching to the release.
      - name: Stage release artifact
        run: |
          cp build/app/outputs/flutter-apk/groceries-v${{ steps.version.outputs.version }}-release.apk \
             build/app/outputs/flutter-apk/Groceries-v${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: build/app/outputs/flutter-apk/Groceries-v${{ steps.version.outputs.version }}.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
